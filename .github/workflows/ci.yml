name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/api/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Lint frontend
        run: npm run lint

      - name: Build applications
        run: npm run build

      - name: Smoke test local RAG and LLM
        run: npm run test:smoke:local-llm

      - name: Validate production compose config
        run: |
          cp .env.production.example .env.production
          docker compose --env-file .env.production -f docker-compose.production.yml config >/tmp/rag-compose-config.yml

      - name: Build production image
        run: docker build -t rag-ocr-knowledge-agent:ci .
