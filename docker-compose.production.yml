services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      WEB_DIST_DIR: /app/apps/web/dist
      DATABASE_URL: postgres://rag_ocr:${POSTGRES_PASSWORD}@postgres:5432/rag_ocr
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      tei:
        condition: service_started
    volumes:
      - app_data:/app/data
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_ocr
      POSTGRES_USER: rag_ocr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_ocr -d rag_ocr"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.15.3
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"

  tei:
    image: ${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest}
    restart: unless-stopped
    command:
      - --model-id
      - ${TEI_RERANKER_MODEL:-BAAI/bge-reranker-base}
      - --max-concurrent-requests
      - "32"
      - --max-client-batch-size
      - "12"
    environment:
      HF_HOME: /data
    volumes:
      - tei_cache:/data
    ports:
      - "${TEI_PORT:-8080}:80"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  app_data:
  postgres_data:
  qdrant_data:
  tei_cache:
  redis_data:
  minio_data:
